name: Daily Supabase Backup

on:
  schedule:
    # 每天台北時間 04:00 (UTC 20:00) 執行
    - cron: '0 20 * * *'
  workflow_dispatch: # 允許手動觸發

jobs:
  backup:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0 # 抓取完整歷史，這對 rebase 很重要

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20' # 回到 20 比較穩，那些警告只是警告，不影響執行

      - name: Install dependencies
        run: npm install

      - name: Run backup script
        env:
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}
        run: node scripts/backup.js

      - name: Commit and push changes
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          
          # 先將變動加入暫存區，避免 pull --rebase 報錯
          if [ -d "backups" ] && [ "$(ls -A backups)" ]; then
            git add backups/
            
            if git diff --staged --quiet; then
              echo "數據無變動，無需提交。"
            else
              # 先提交本地變動
              git commit -m "Auto-backup: $(date +'%Y-%m-%d')"
              
              # 再次嘗試拉取並推送，處理可能發生的遠端衝突
              git pull origin main --rebase
              git push origin main
            fi
          else
            echo "未偵測到新的備份檔案，略過提交步驟。"
          fi
